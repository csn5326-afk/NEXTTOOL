<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXT FULL TOOL | MOBILE PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #plexus-canvas { z-index: 1; }
        #matrix-canvas { z-index: 50; display: none; }

        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        #password-input {
            background: rgba(255, 0, 0, 0.1); 
            border: 2px solid #ff0000;
            padding: 18px 25px; 
            color: #fff; 
            font-size: 20px; 
            text-align: center;
            outline: none; 
            border-radius: 15px; 
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
            width: 85%;
            max-width: 320px;
        }

        #loader-container { display: none; flex-direction: column; align-items: center; width: 100%; }
        #progress-bar-bg { width: 80%; max-width: 280px; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 0, 0, 0.3); }
        #progress-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #600, #ff0000); box-shadow: 0 0 15px #ff0000; }

        .container { 
            position: relative; 
            z-index: 10; 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            display: none; 
            animation: fadeIn 0.6s ease-out; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .profile-container { 
            width: 120px; height: 120px; 
            margin: 0 auto 25px; 
            border: 3px solid #ff0000; 
            border-radius: 30px; 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); 
            overflow: hidden; 
        }
        .profile-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: #fff; font-size: 26px; letter-spacing: 2px; text-shadow: 0 0 15px #ff0000; margin-bottom: 40px; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }

        .action-btn, .execute-btn, .result-btn, .paste-btn {
            background: rgba(255, 255, 255, 0.05); color: #fff; border: 1.5px solid rgba(255, 0, 0, 0.5);
            border-radius: 15px; padding: 22px 5px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.2s; backdrop-filter: blur(15px);
            width: 100%;
        }

        .action-btn:active, .execute-btn:active, .paste-btn:active { background: rgba(255, 0, 0, 0.3); border-color: #ff0000; transform: scale(0.95); }

        .input-group { position: relative; width: 100%; margin-bottom: 25px; }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(255, 0, 0, 0.4); border-color: rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.8); border-color: #ff0000; }
            100% { box-shadow: 0 0 5px rgba(255, 0, 0, 0.4); border-color: rgba(255, 0, 0, 0.5); }
        }

        #id-input-field { 
            background: rgba(0, 0, 0, 0.7); border: 2px solid #ff0000; 
            padding: 20px; width: 100%; color: #fff; border-radius: 15px; 
            text-align: center; font-size: 18px; outline: none; 
            animation: glowPulse 2s infinite ease-in-out;
        }

        .paste-btn {
            margin-top: 10px; padding: 12px; font-size: 10px;
            background: rgba(255, 0, 0, 0.1); border-style: dashed;
        }

        .back-btn { color: #ff0000; font-size: 13px; display: block; margin-top: 30px; font-weight: bold; letter-spacing: 2px; cursor: pointer; }

        #final-result {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; width: 85%; max-width: 350px; text-align: center; display: none;
        }

        .result-btn { margin-bottom: 15px; border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); animation: slideIn 0.5s forwards; opacity: 0; }
        .success-style { color: #ff0000; background: rgba(255, 0, 0, 0.15); text-shadow: 0 0 10px #ff0000; font-size: 14px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        footer { margin-top: 50px; color: #ff0000; font-size: 12px; opacity: 0.6; font-family: monospace; }
    </style>
</head>
<body>

    <canvas id="plexus-canvas"></canvas>
    <canvas id="matrix-canvas"></canvas>

    <div id="final-result">
        <button class="result-btn" id="res-id" style="animation-delay: 0.2s;"></button>
        <button class="result-btn success-style" style="animation-delay: 0.4s;">BANNED SUCCESSFULLY</button>
        <span class="back-btn" onclick="resetToMenu()">[ RETURN TO MENU ]</span>
    </div>

    <div id="lock-screen">
        <div id="input-area" style="text-align: center; width: 100%; display: flex; justify-content: center;">
            <input type="password" id="password-input" placeholder="ENTER ACCESS KEY..." onkeydown="startAccess(event)">
        </div>
        <div id="loader-container">
            <p style="color:#fff; margin-bottom:20px; font-family: monospace;">INITIALIZING SYSTEM...</p>
            <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
            <p id="percentage" style="color:#ff0000; margin-top:15px; font-weight: bold;">0%</p>
        </div>
    </div>

    <div id="main-ui" class="container">
        <div class="profile-container">
            <img src="https://i.ibb.co/RkPzT8b2/IMG-0806.jpg" alt="Admin">
        </div>
        <h1>NEXT FULL TOOL</h1>
        <div class="button-grid">
            <button class="action-btn" onclick="showIdPage('BAN PLAYER')">BAN PLAYER</button>
            <button class="action-btn" onclick="showIdPage('PLAYER CHECKED')">CHECK PLAYER</button>
            <button class="action-btn" onclick="showIdPage('GLITCH BAN')">GLITCH BAN</button>
            <button class="action-btn" onclick="showIdPage('INFO PLAYER')">INFO PLAYER</button>
            <button class="action-btn" onclick="showIdPage('INFO ROOM')">INFO ROOM</button>
            <button class="action-btn" onclick="showIdPage('SERVER INFO')">SERVER INFO</button>
            <button class="action-btn"
            <button class="action-btn" onclick="showIdPage('GHOST MODE')">GHOST MODE</button>
            <button class="action-btn" onclick="showIdPage('BYPASS CHECK')">BYPASS</button>
        </div>
        <footer>NEXTDEV v6.5 | NEXT BY </footer>
    </div>

    <div id="id-page" class="container">
        <h2 id="page-title" style="color:#fff; margin-bottom: 30px; font-family: monospace;">ENTER PLAYER ID</h2>
        <div class="input-group">
            <input type="number" id="id-input-field" placeholder="ENTER" inputmode="numeric">
            <button class="paste-btn" onclick="pasteID()">PASTE FROM CLIPBOARD</button>
        </div>
        <button class="execute-btn" style="padding: 25px; font-size: 16px;" onclick="startMatrixProcess()">EXECUTE COMMAND</button>
        <span class="back-btn" onclick="showMainPage()">[ BACK ]</span>
    </div>

    <script>
        // English Prompt
        function pasteID() {
            let pastedText = window.prompt("PASTE ID HERE:");
            if (pastedText !== null && pastedText !== "") {
                document.getElementById('id-input-field').value = pastedText.trim();
            }
        }

        function startAccess(e) {
            if (e.key === "Enter") {
                if (document.getElementById('password-input').value.toUpperCase() === "NEXTREDA") {
                    document.getElementById('input-area').style.display = "none";
                    document.getElementById('loader-container').style.display = "flex";
                    simulateLoading();
                }
            }
        }

        function simulateLoading() {
            let width = 0;
            let bar = document.getElementById('progress-bar-fill');
            let perc = document.getElementById('percentage');
            let int = setInterval(() => {
                if (width >= 100) {
                    clearInterval(int);
                    document.getElementById('lock-screen').style.opacity = "0";
                    setTimeout(() => {
                        document.getElementById('lock-screen').style.display = "none";
                        document.getElementById('main-ui').style.display = "block";
                    }, 800);
                } else {
                    width += Math.floor(Math.random() * 5) + 1;
                    if(width > 100) width = 100;
                    bar.style.width = width + "%";
                    perc.innerText = width + "%";
                }
            }, 40);
        }

        function showIdPage(name) { 
            document.getElementById('main-ui').style.display = "none"; 
            document.getElementById('id-page').style.display = "block"; 
            document.getElementById('page-title').innerText = name; 
        }
        function showMainPage() { document.getElementById('id-page').style.display = "none"; document.getElementById('main-ui').style.display = "block"; }

        function startMatrixProcess() {
            let idValue = document.getElementById('id-input-field').value;
            if(!idValue) return;
            document.getElementById('id-page').style.display = "none";
            const mCanvas = document.getElementById('matrix-canvas');
            mCanvas.style.display = "block";
            const ctxM = mCanvas.getContext('2d');
            mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
            const chars = "0123456789ABCDEF"; const fontSize = 18;
            const columns = mCanvas.width / fontSize; const drops = Array(Math.floor(columns)).fill(1);

            const matrixInterval = setInterval(() => {
                ctxM.fillStyle = "rgba(0, 0, 0, 0.1)"; ctxM.fillRect(0, 0, mCanvas.width, mCanvas.height);
                ctxM.fillStyle = "#ff0000"; ctxM.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    ctxM.fillText(chars[Math.floor(Math.random()*chars.length)], i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }, 35);

            setTimeout(() => {
                clearInterval(matrixInterval);
                mCanvas.style.display = "none";
                document.getElementById('res-id').innerText = "TARGET ID: " + idValue;
                document.getElementById('final-result').style.display = "block";
            }, 2500);
        }

        function resetToMenu() {
            document.getElementById('final-result').style.display = "none";
            showMainPage();
        }

        const canvas = document.getElementById('plexus-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array(60).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.6, vy: (Math.random()-0.5)*0.6 }));
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#ff0000";
            particles.forEach((p, i) => {
                p.x+=p.vx; p.y+=p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
                for(let j=i+1; j<particles.length; j++) {
                    let d = Math.hypot(p.x-particles[j].x, p.y-particles[j].y);
                    if(d<130) { ctx.strokeStyle = `rgba(255,0,0,${1-d/130})`; ctx.lineWidth=0.8; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
    </script>
</body>
</html>
